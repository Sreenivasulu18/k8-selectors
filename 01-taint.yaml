apiVersion: apps/v1 
kind: Deployment 
metadata:
  name: nginx 
  # these are replicas set labels
  labels:
    purpose: dp-demo 
    project: roboshop 
spec:
  replicas: 1
  selector:
  # these labels are used to select pods
    matchLabels:
      purpose: headless-svc-demo 
      project: roboshop 
  # pod defination
  template: 
    metadata:
      labels:
        purpose: headless-svc-demo 
        project: roboshop
    spec:
      containers: 
      - name: nginx 
        image: nginx:latest